<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { display: flex; justify-content: center; }
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <canvas id="snakeGameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('snakeGameCanvas');
        const ctx = canvas.getContext('2d');
        let snake = [{x: 10, y: 10}];
        let direction = {x: 0, y: 0};
        let food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') direction = {x: 0, y: -1};
            if (event.key === 'ArrowDown') direction = {x: 0, y: 1};
            if (event.key === 'ArrowLeft') direction = {x: -1, y: 0};
            if (event.key === 'ArrowRight') direction = {x: 1, y: 0};
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snake.forEach(segment => {
                ctx.fillStyle = 'green';
                ctx.fillRect(segment.x * 20, segment.y * 20, 18, 18);
            });

            if (snake[0].x === food.x && snake[0].y === food.y) {
                snake.push({});
                food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
            }

            snake.forEach((segment, index) => {
                if (index === 0) {
                    segment.x += direction.x;
                    segment.y += direction.y;
                } else {
                    segment.x = snake[index - 1].x;
                    segment.y = snake[index - 1].y;
                }
            });
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
